# Docker Compose configuration for local development
# 
# Services:
#   - frontend: React app (port 5173)
#   - api: FastAPI backend (port 8000)
#   - mongo: MongoDB database (port 27017)
# 
# Usage:
#   docker-compose up        # Start all services
#   docker-compose down      # Stop all services
#   docker-compose down -v   # Stop and remove volumes (reset database)

services:
  frontend:
    # React application built with Vite
    # Proxies /api requests to backend during development
    build:
      context: ./frontend
    container_name: rental-fleet-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  api:
    # FastAPI backend application
    # Serves REST API endpoints and Prometheus metrics
    build: .
    container_name: rental-fleet-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Rental Fleet Manager API
      ENVIRONMENT: docker
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: rental_fleet
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/rental_fleet.log
    volumes:
      - rental-fleet-logs:/app/logs
    depends_on:
      - mongo

  mongo:
    # MongoDB NoSQL database
    # Stores cars and rentals collections
    image: mongo:7
    container_name: rental-fleet-mongo
    ports:
      - "27017:27017"
    volumes:
      - rental-fleet-data:/data/db

volumes:
  rental-fleet-data:
  rental-fleet-logs:
